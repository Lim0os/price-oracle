services:
  postgres:
    image: postgres:16-alpine
    container_name: price-oracle-postgres
    environment:
      POSTGRES_DB: price_oracle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price-oracle-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      GRPC_HOST: 0.0.0.0
      GRPC_PORT: 50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: price_oracle
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      GRINEX_BASE_URL: https://grinex.io
      GRINEX_SYMBOL: usdta7a5
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
      OTEL_INSECURE: "true"
      LOG_LEVEL: debug
    ports:
      - "50051:50051"
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: price-oracle-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"
    depends_on:
      - app

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: price-oracle-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14268:14268"   # Jaeger thrift
      - "5778:5778"     # Config
      - "9411:9411"     # Zipkin
    depends_on:
      - app

volumes:
  postgres_data:
  prometheus_data:
